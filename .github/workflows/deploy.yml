name: Smart Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 5

      # 2. ✅ 从 Secrets 生成 config.js（含敏感配置，不进仓库）
      - name: Generate config.js from Secrets
        run: |
          cat > config.js << 'EOF'
          window.NAVAIL_CONFIG = {
            SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',
            SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}',
            GA_MEASUREMENT_ID: '${{ secrets.GA_MEASUREMENT_ID }}',
          };
          EOF

      # 3. 打包 dist（version.txt 由仓库受控，每次发版手动更新）
      - name: Prepare dist
        run: |
          mkdir dist
          cp *.html dist/
          cp version.txt dist/
          cp changelog.txt dist/
          cp config.js dist/
          cp config.example.js dist/ 2>/dev/null || true

      # 4. Debug 确认文件
      - name: Check files
        run: ls -la dist/

      # 5. 部署到 GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
