name: Smart Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 5

      # 2. 生成时间 & 版本号（Asia/Shanghai 时区）
      - name: Generate Version Info
        run: |
          export TZ='Asia/Shanghai'
          echo "BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "VERSION=v$(date '+%Y.%m.%d.%H%M')" >> $GITHUB_ENV

      # 3. 写入版本文件
      - name: Create version file
        run: |
          echo "Version: $VERSION" > version.txt
          echo "Last updated: $BUILD_TIME" >> version.txt

      # 4. ✅ 新增：从 Secrets 生成 config.js（含敏感配置，不进仓库）
      - name: Generate config.js from Secrets
        run: |
          cat > config.js << 'EOF'
          window.NAVAIL_CONFIG = {
            SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',
            SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}',
            GA_MEASUREMENT_ID: '${{ secrets.GA_MEASUREMENT_ID }}',
          };
          EOF

      # 5. 打包 dist
      - name: Prepare dist
        run: |
          mkdir dist
          cp *.html dist/
          cp version.txt dist/
          cp changelog.txt dist/
          cp config.js dist/
          cp config.example.js dist/ 2>/dev/null || true

      # 6. Debug 确认文件
      - name: Check files
        run: ls -la dist/

      # 7. 部署到 GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
